<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Magic</title>
  <style>
    body { 
      margin: 0; 
      background: radial-gradient(circle at center, #2e1b4e 0%, #0f0a1f 100%); 
      color: #fff; 
      font-family: 'Segoe UI', sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      overflow: hidden; 
    }
    #room { text-align: center; z-index: 2; transition: opacity 1s; padding: 20px; }
    #candles { font-size: 3rem; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.6)); }
    .candle { display: inline-block; margin: 0 5px; transition: opacity 0.5s; cursor: pointer; }
    .out { opacity: 0.1; filter: grayscale(1) blur(1px); }
    h1 { font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(to right, #ffd700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #message { font-size: 1.3rem; color: #d1c4e9; margin-bottom: 30px; letter-spacing: 1px; }
    #btn { 
      padding: 15px 40px; 
      background: rgba(255, 255, 255, 0.1); 
      border: 1px solid rgba(255, 255, 255, 0.3); 
      color: white; 
      border-radius: 50px; 
      cursor: pointer; 
      font-size: 1.1rem; 
      transition: 0.4s; 
      backdrop-filter: blur(5px);
    }
    #btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-3px); }
    #cake { font-size: 7rem; cursor: pointer; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: inline-block; }
    #cake:hover { transform: scale(1.1) rotate(5deg); }
    canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
    .fade-in { animation: fadeIn 2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div id="room">
  <div id="candles">
    <span class="candle">🕯️</span><span class="candle">🕯️</span><span class="candle">🕯️</span><span class="candle">🕯️</span><span class="candle">🕯️</span>
    <span class="candle">🕯️</span><span class="candle">🕯️</span><span class="candle">🕯️</span><span class="candle">🕯️</span><span class="candle">🕯️</span>
  </div>
  <h1 id="title">Blow out the candles!</h1>
  <p id="message">Make your birthday wish count...</p>
  <button id="btn">Blow!</button>
</div>

<script>
  const candles = document.querySelectorAll('.candle');
  const btn = document.getElementById('btn');
  const title = document.getElementById('title');
  const message = document.getElementById('message');
  const room = document.getElementById('room');
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  
  let count = 0;
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;

  btn.addEventListener('click', () => {
    if (count < candles.length) {
      candles[count].classList.add('out');
      count++;
    }
    if (count === candles.length) {
      room.innerHTML = `<div id="cake">🎂</div><h1 class="fade-in">Make a Wish!</h1><p class="fade-in">Click the cake to seal your wish.</p>`;
      document.getElementById('cake').addEventListener('click', celebrate);
    }
  });

  function celebrate() {
    room.innerHTML = `<h1 class="fade-in">Happy Birthday! ✨</h1><p class="fade-in" style="font-size: 1.5rem;">May this year be the brightest chapter of your story yet.</p>`;
    let particles = Array.from({length: 150}, () => ({
      x: Math.random()*canvas.width, y: -20, r: Math.random()*6, d: Math.random()*3 + 2, c: ['#ffcc00', '#ff69b4', '#87ceeb', '#dda0dd'][Math.floor(Math.random()*4)]
    }));
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => { 
        ctx.fillStyle = p.c; 
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); 
        p.y += p.d; if(p.y > canvas.height) p.y = -20; 
      });
      requestAnimationFrame(draw);
    }
    draw();
  }
</script>
</body>
</html>
