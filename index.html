<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0010;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* Photo revealed behind the cloth */
    #photo-bg {
      position: absolute;
      inset: 0;
      background: url('photo.jpeg') center/cover no-repeat;
      z-index: 0;
    }

    /* Cloth canvas sits on top */
    #cloth-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: crosshair;
      touch-action: none;
    }

    /* Confetti above everything */
    #confetti-canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      background: rgba(0,0,0,0.45);
      padding: 7px 18px;
      border-radius: 30px;
      letter-spacing: 0.06em;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #replay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 7px 20px;
      border: 1px solid rgba(245, 200, 66, 0.5);
      background: transparent;
      color: #F5C842;
      border-radius: 30px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.2s;
      z-index: 5;
    }
    #replay:hover { background: rgba(245,200,66,0.15); }
    #replay.visible { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div id="photo-bg"></div>
  <canvas id="cloth-canvas"></canvas>
  <canvas id="confetti-canvas"></canvas>
  <div id="hint">✦ Grab &amp; tear the cloth</div>
  <button id="replay">↺ Replay</button>
</div>

<script>
// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
const canvas   = document.getElementById('cloth-canvas');
const ctx      = canvas.getContext('2d');
const confCvs  = document.getElementById('confetti-canvas');
const confCtx  = confCvs.getContext('2d');
const app      = document.getElementById('app');
const hint     = document.getElementById('hint');
const replayBtn= document.getElementById('replay');

let W, H;

// Cloth grid resolution — more cols = smoother but heavier
const COLS = 40;
const ROWS = 30;
let SX, SY; // spacing x / y

// Physics constants
const GRAVITY        = 0.5;
const DAMPING        = 0.988;
const ITERATIONS     = 8;
const TEAR_DIST_MULT = 2.6;   // stick tears when stretched beyond this × rest length
const MOUSE_RADIUS   = 80;    // px influence radius
const MOUSE_CUT_RADIUS = 55;  // px cut radius when dragging fast

let pts  = [];
let segs = [];

// Cloth image (bday.webp painted onto the cloth)
const clothImg = new Image();
clothImg.src = 'bday.webp';
let clothImgReady = false;
clothImg.onload = () => { clothImgReady = true; };

// Off-screen canvas to sample cloth image colours per tile
const sampler = document.createElement('canvas');
const sampCtx = sampler.getContext('2d');

// Mouse/touch state
const mouse = { x: -9999, y: -9999, px: -9999, py: -9999, down: false };

// Confetti
let confPieces = [];
let confRaf;
let revealDone = false;

// ─────────────────────────────────────────────
//  INIT CLOTH
// ─────────────────────────────────────────────
function initCloth() {
  pts = [];
  segs = [];
  revealDone = false;
  replayBtn.classList.remove('visible');
  hint.style.opacity = '1';

  // Sample colours from bday.webp at cloth resolution
  sampler.width  = COLS;
  sampler.height = ROWS;
  if (clothImgReady) {
    sampCtx.drawImage(clothImg, 0, 0, COLS, ROWS);
  } else {
    // Fallback gradient if image not yet loaded
    const grad = sampCtx.createLinearGradient(0, 0, COLS, ROWS);
    grad.addColorStop(0,   '#7b2d8b');
    grad.addColorStop(0.5, '#c0392b');
    grad.addColorStop(1,   '#e67e22');
    sampCtx.fillStyle = grad;
    sampCtx.fillRect(0, 0, COLS, ROWS);
  }
  const imgData = sampCtx.getImageData(0, 0, COLS, ROWS).data;

  // Build points
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * SX;
      const y = r * SY;
      const idx = (r * COLS + c) * 4;
      pts.push({
        x, y, px: x, py: y,
        pinned: r === 0,
        cr: imgData[idx],
        cg: imgData[idx + 1],
        cb: imgData[idx + 2],
      });
    }
  }

  // Horizontal sticks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const i = r * COLS + c;
      segs.push({ a: pts[i], b: pts[i + 1], len: SX, torn: false });
    }
  }
  // Vertical sticks
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS; c++) {
      const i = r * COLS + c;
      segs.push({ a: pts[i], b: pts[i + COLS], len: SY, torn: false });
    }
  }
}

// ─────────────────────────────────────────────
//  PHYSICS UPDATE
// ─────────────────────────────────────────────
function update() {
  const mdx = mouse.x - mouse.px;
  const mdy = mouse.y - mouse.py;
  const mspeed = Math.hypot(mdx, mdy);

  // Integrate velocity
  for (const p of pts) {
    if (p.pinned) continue;
    const vx = (p.x - p.px) * DAMPING;
    const vy = (p.y - p.py) * DAMPING;
    p.px = p.x;
    p.py = p.y;
    p.x += vx;
    p.y += vy + GRAVITY;
    // Floor
    if (p.y > H + 60) { p.y = H + 60; }

    // Mouse interaction
    if (mouse.down) {
      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.hypot(dx, dy);
      if (dist < MOUSE_RADIUS) {
        const f = (1 - dist / MOUSE_RADIUS);
        p.x += mdx * f * 0.5;
        p.y += mdy * f * 0.5;
      }
    }
  }

  // Constraint solving
  for (let iter = 0; iter < ITERATIONS; iter++) {
    for (const s of segs) {
      if (s.torn) continue;
      const dx = s.b.x - s.a.x;
      const dy = s.b.y - s.a.y;
      const dist = Math.hypot(dx, dy) || 0.001;
      const diff = (dist - s.len) / dist * 0.5;
      const ox = dx * diff;
      const oy = dy * diff;
      if (!s.a.pinned) { s.a.x += ox; s.a.y += oy; }
      if (!s.b.pinned) { s.b.x -= ox; s.b.y -= oy; }
      // Auto-tear if over-stretched
      if (dist > s.len * TEAR_DIST_MULT) {
        s.torn = true;
      }
    }
  }

  // Mouse cut: tear sticks near cursor when dragging fast
  if (mouse.down && mspeed > 4) {
    for (const s of segs) {
      if (s.torn) continue;
      const mx = (s.a.x + s.b.x) * 0.5;
      const my = (s.a.y + s.b.y) * 0.5;
      if (Math.hypot(mx - mouse.x, my - mouse.y) < MOUSE_CUT_RADIUS) {
        s.torn = true;
      }
    }
  }

  mouse.px = mouse.x;
  mouse.py = mouse.y;

  // Check reveal progress
  if (!revealDone) {
    const tornCount = segs.filter(s => s.torn).length;
    const pct = tornCount / segs.length;
    if (pct > 0.35) {
      revealDone = true;
      hint.style.opacity = '0';
      setTimeout(() => {
        launchConfetti();
        replayBtn.classList.add('visible');
      }, 400);
    }
  }
}

// ─────────────────────────────────────────────
//  DRAW — smooth cloth quads, no grid lines
// ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // We draw the cloth as filled quads using image data colours.
  // Skip any quad where a bordering stick is torn → shows photo behind.
  // We also build a lookup for torn sticks keyed by point pair for speed.
  const tornH = new Set(); // horizontal torn sticks: key = r*COLS+c → r*COLS+c+1
  const tornV = new Set(); // vertical torn sticks

  for (const s of segs) {
    if (!s.torn) continue;
    // Determine orientation by rest length
    const ia = pts.indexOf(s.a);
    const ib = pts.indexOf(s.b);
    if (ib === ia + 1) tornH.add(ia);         // horizontal
    else if (ib === ia + COLS) tornV.add(ia); // vertical
  }

  // Draw filled quads
  const clothPath = new Path2D();
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const i  = r * COLS + c;
      const p0 = pts[i];
      const p1 = pts[i + 1];
      const p2 = pts[i + COLS];
      const p3 = pts[i + COLS + 1];

      // Skip if any of the 4 bounding sticks are torn
      if (tornH.has(i) || tornH.has(i + COLS) || tornV.has(i) || tornV.has(i + 1)) continue;

      // Colour from sampled bday.webp pixel — use centre of quad
      const cr = (p0.cr + p1.cr + p2.cr + p3.cr) >> 2;
      const cg = (p0.cg + p1.cg + p2.cg + p3.cg) >> 2;
      const cb = (p0.cb + p1.cb + p2.cb + p3.cb) >> 2;

      // Simple diffuse shading: normal-ish from quad geometry
      const nx = (p1.x - p0.x);
      const ny = (p2.y - p0.y);
      const len = Math.hypot(nx, ny) || 1;
      // Light from top-left
      const shade = 0.72 + 0.28 * Math.min(1, Math.max(0, (nx + ny) / len / 2 + 0.5));

      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.closePath();
      ctx.fillStyle = `rgb(${Math.round(cr*shade)},${Math.round(cg*shade)},${Math.round(cb*shade)})`;
      ctx.fill();
      clothPath.moveTo(p0.x, p0.y);
      clothPath.lineTo(p1.x, p1.y);
      clothPath.lineTo(p3.x, p3.y);
      clothPath.lineTo(p2.x, p2.y);
      clothPath.closePath();
      // NO stroke → no grid lines
    }
  }

  ctx.save();
  ctx.clip(clothPath);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `700 ${Math.min(W * 0.12, H * 0.13, 86)}px Georgia, serif`;
  ctx.lineWidth = Math.max(4, Math.min(W, H) * 0.008);
  ctx.strokeStyle = 'rgba(45, 12, 55, 0.72)';
  ctx.fillStyle = '#fff4c7';
  ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
  ctx.shadowBlur = 10;
  ctx.strokeText('Happy Birthday', W / 2, H * 0.48);
  ctx.fillText('Happy Birthday', W / 2, H * 0.48);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  CONFETTI
// ─────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#F5C842','#E8637A','#9B6FD8','#4ECDC4','#F08A5D','#6BCB77','#fff'];
  confPieces = Array.from({ length: 160 }, () => ({
    x: Math.random() * W, y: -20 - Math.random() * 180,
    r: 3 + Math.random() * 5, d: 1.4 + Math.random() * 2.5,
    c: colors[Math.floor(Math.random() * colors.length)],
    t: Math.random() * Math.PI * 2, s: (Math.random() - 0.5) * 1.8, o: 1,
  }));
  cancelAnimationFrame(confRaf);
  tickConfetti();
}

function tickConfetti() {
  confCtx.clearRect(0, 0, W, H);
  let alive = false;
  for (const p of confPieces) {
    p.y += p.d; p.x += p.s; p.t += 0.04; p.o -= 0.0035;
    if (p.o <= 0) p.o = 0;
    if (p.y < H + 20) alive = true;
    confCtx.save();
    confCtx.globalAlpha = p.o;
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.t);
    confCtx.fillStyle = p.c;
    confCtx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
    confCtx.restore();
  }
  if (alive) confRaf = requestAnimationFrame(tickConfetti);
}

// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────
function resize() {
  W = app.clientWidth;
  H = app.clientHeight;
  canvas.width  = W; canvas.height  = H;
  confCvs.width = W; confCvs.height = H;
  SX = W / (COLS - 1);
  SY = H / (ROWS - 1);
  initCloth();
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
function getXY(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  const p = getXY(e);
  mouse.x = p.x; mouse.y = p.y; mouse.px = p.x; mouse.py = p.y;
  hint.style.opacity = '0';
});
canvas.addEventListener('mousemove', e => {
  if (!mouse.down) return;
  mouse.px = mouse.x; mouse.py = mouse.y;
  const p = getXY(e); mouse.x = p.x; mouse.y = p.y;
});
window.addEventListener('mouseup', () => { mouse.down = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouse.down = true;
  const p = getXY(e);
  mouse.x = p.x; mouse.y = p.y; mouse.px = p.x; mouse.py = p.y;
  hint.style.opacity = '0';
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!mouse.down) return;
  mouse.px = mouse.x; mouse.py = mouse.y;
  const p = getXY(e); mouse.x = p.x; mouse.y = p.y;
}, { passive: false });
window.addEventListener('touchend', () => { mouse.down = false; });

replayBtn.addEventListener('click', () => {
  confPieces = [];
  confCtx.clearRect(0, 0, W, H);
  resize();
});

window.addEventListener('resize', resize);

// Wait for cloth image before first init
function start() {
  resize();
  loop();
}

if (clothImgReady) {
  start();
} else {
  clothImg.onload = () => { clothImgReady = true; start(); };
  // Start anyway after short delay even if image fails
  setTimeout(start, 300);
}
</script>
</body>
</html>
